services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: bigdata_lab2
      POSTGRES_USER: my_user
      POSTGRES_PASSWORD: "12345"
    ports:
      - "5435:5432"
    volumes:
      - "./исходные данные:/data"
      - "./sql:/docker-entrypoint-initdb.d"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U my_user -d bigdata_lab2"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    environment:
      CLICKHOUSE_USER: click
      CLICKHOUSE_PASSWORD: click
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 20

  spark:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: spark
    volumes:
      - ./spark:/opt/spark/apps
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/opt/spark/apps/run_etl.sh"]
